# ═══════════════════════════════════════════════════════
# ContextForge Engine — Docker Compose
# All-in-one development environment
# Usage: docker compose up -d
# ═══════════════════════════════════════════════════════

name: contextforge

services:

  # ─── PostgreSQL (App State + LangGraph Checkpointing) ─
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contextforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
      POSTGRES_DB: ${POSTGRES_DB:-contextforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contextforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - contextforge-net

  # ─── TimescaleDB (Time Series Data) ────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${TIMESCALE_USER:-contextforge}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-changeme_timescale}
      POSTGRES_DB: ${TIMESCALE_DB:-contextforge_ts}
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-contextforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - contextforge-net

  # ─── Neo4j (Temporal Knowledge Graph) ──────────────
  neo4j:
    image: neo4j:5.23-community
    ports:
      - "7474:7474"    # HTTP Browser
      - "7687:7687"    # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme_neo4j}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-changeme_neo4j} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - contextforge-net

  # ─── Qdrant (Vector Database) ──────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - contextforge-net

  # ─── Redis (Cache + Event Streams + Pub/Sub) ──────
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - contextforge-net

  # ─── ClickHouse (Langfuse Backend) ─────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"    # HTTP
      - "9000:9000"    # Native
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme_clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - observability
      - full
    networks:
      - contextforge-net

  # ─── Ollama (Local LLM — CPU only) ────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    profiles:
      - local-llm
      - full
    networks:
      - contextforge-net

  # ─── LiteLLM (LLM Gateway — Multi-Provider) ──────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_API_BASE: ${OLLAMA_HOST:-http://ollama:11434}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - contextforge-net

  # ─── Langfuse (Observability — Self-Hosted) ───────
  langfuse:
    image: langfuse/langfuse:3
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: ${LANGFUSE_DATABASE_URL:-postgresql://contextforge:changeme_postgres@postgres:5432/langfuse}
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme_clickhouse}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme_nextauth}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3001}
      SALT: ${LANGFUSE_SALT:-changeme_salt}
      LANGFUSE_INIT_ORG_ID: contextforge
      LANGFUSE_INIT_ORG_NAME: ContextForge
      LANGFUSE_INIT_PROJECT_ID: contextforge-dev
      LANGFUSE_INIT_PROJECT_NAME: ContextForge Dev
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-changeme}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-changeme}
      LANGFUSE_INIT_USER_EMAIL: admin@contextforge.local
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: changeme_langfuse
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - observability
      - full
    networks:
      - contextforge-net

  # ─── Keycloak (Authentication & Authorization) ─────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme_keycloak}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-contextforge}
      KC_DB_USERNAME: ${POSTGRES_USER:-contextforge}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - auth
      - full
    networks:
      - contextforge-net

  # ─── ContextForge API (FastAPI Engine) ─────────────
  api:
    build:
      context: ./platform/engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CONTEXTFORGE_ENV: ${CONTEXTFORGE_ENV:-development}
      CONTEXTFORGE_DEBUG: ${CONTEXTFORGE_DEBUG:-true}
      CONTEXTFORGE_LOG_LEVEL: ${CONTEXTFORGE_LOG_LEVEL:-INFO}
      CONTEXTFORGE_AUTH_DISABLED: ${CONTEXTFORGE_AUTH_DISABLED:-true}
      CONTEXTFORGE_POSTGRES_URI: ${CONTEXTFORGE_POSTGRES_URI:-postgresql://contextforge:changeme_postgres@postgres:5432/contextforge}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-contextforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
      POSTGRES_DB: ${POSTGRES_DB:-contextforge}
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_USER: ${TIMESCALE_USER:-contextforge}
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD:-changeme_timescale}
      TIMESCALE_DB: ${TIMESCALE_DB:-contextforge_ts}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme_neo4j}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-changeme}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-changeme}
      CONTEXTFORGE_EMBEDDING_MODEL: ${CONTEXTFORGE_EMBEDDING_MODEL:-text-embedding-3-small}
      CONTEXTFORGE_EMBEDDING_DIM: ${CONTEXTFORGE_EMBEDDING_DIM:-1536}
    volumes:
      - ./platform/engine:/app
      - ./domains:/app/domains
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - contextforge-net

  # ─── Frontend (React Dashboard) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      CONTEXTFORGE_API_URL: ${CONTEXTFORGE_API_URL:-http://localhost:8000}
      CONTEXTFORGE_WS_URL: ${CONTEXTFORGE_WS_URL:-ws://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - contextforge-net

# ─── Volumes ──────────────────────────────────────────
volumes:
  postgres_data:
  timescale_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  redis_data:
  clickhouse_data:
  ollama_data:

# ─── Networks ─────────────────────────────────────────
networks:
  contextforge-net:
    driver: bridge
