# ContextForge — Auth (Keycloak)

name: contextforge

services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme_keycloak}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-contextforge}
      KC_DB_USERNAME: ${POSTGRES_USER:-contextforge}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - contextforge-net

networks:
  contextforge-net:
    driver: bridge
